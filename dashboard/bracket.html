<!DOCTYPE html>
<head>
    <!-- Compressed CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.7.5/dist/css/foundation.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="css/gip.css" crossorigin="anonymous">
    
    <!-- Compressed JavaScript -->

</head>
<body>
    <div class="grid-container">
        <div class="grid-x grid-margin-x">
            <div class="cell small-3">
                Quarterfinal 1
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_1_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_1_2"><br/>
            </div>
            <div class="cell small-3">
                Quarterfinal 2
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_2_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_2_2"><br/>
            </div>
            <div class="cell small-3">
                Quarterfinal 3
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_3_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_3_2"><br/>
            </div>
            <div class="cell small-3">
                Quarterfinal 4
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_4_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_4_2"><br/>
            </div>
        </div>
        <div class="grid-x grid-margin-x">
            <div class="cell small-12">
                <div class="expanded button-group no-gaps">
                    <a class="success button" id="updatebutton">Update</a>
                </div>
            </div>
        </div>
        <div class="grid-x grid-margin-x">
            <div class="cell small-3">
                Semifinal 1
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_5_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_5_2"><br/>
            </div>
            <div class="cell small-3">
                Semifinal 2
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_6_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_6_2"><br/>
            </div>
            <div class="cell small-3">
                Grand Finals
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_7_1"><br/>
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_7_2"><br/>
            </div>
            <div class="cell small-3">
                Champion
                <input class="input-group-field" type="text" placeholder="PlayerName" id="player_8_1"><br/>
            </div>
        </div>
    </div>
</body>
<script src="js/bracket.js"></script>
</html>
